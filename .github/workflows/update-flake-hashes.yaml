name: Update flake hashes

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version. Defaults to Cargo.toml workspace version."
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flake-hashes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GlobalProtect-openconnect
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Update flake hashes
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [[ -n "$RELEASE_VERSION" ]]; then
            scripts/update-flake-hashes.sh "$RELEASE_VERSION"
          else
            scripts/update-flake-hashes.sh
          fi

      - name: Open pull request
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: scripts/open-flake-hashes-pr.sh "$RELEASE_VERSION"
